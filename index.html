<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Portal</title>
    <meta name="description" content="Machine Maintenance PDF Form Generator">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <h1 class="logo">MAINTENANCE<span>PORTAL</span></h1>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <button id="dark-toggle" onclick="toggleDarkMode()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;border-radius:999px;padding:0.4rem 0.9rem;cursor:pointer;font-size:0.78rem;font-weight:600;letter-spacing:0.3px;">🌙 Dark</button>
                <div class="stats">
                    <span class="stat-label">Total PDFs Downloaded:</span>
                    <span class="stat-value" id="download-count">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app-content">
            <!-- Views will be injected here by app.js -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
